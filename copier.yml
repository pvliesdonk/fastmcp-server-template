# Copier configuration for fastmcp-server-template.
#
# Spec: docs/superpowers/specs/2026-04-20-fastmcp-copier-scaffold-design.md
# (markdown-vault-mcp repo).

_min_copier_version: "9.0"
_answers_file: .copier-answers.yml
_templates_suffix: .jinja

# Post-generation: vendor the MCP Apps SDK into static/app.html.  The task value
# is Jinja-rendered; it collapses to an empty string (skipped) for non-apps
# projects.  Runs on `copier copy` AND `copier update` — regenerates app.html
# from the project's (possibly customized) app.src.html.  Requires network
# (downloads @modelcontextprotocol/ext-apps).  Both CI paths pass --trust.
_tasks:
  - "{% if include_mcp_apps_scaffold %}python scripts/vendor_spa.py{% endif %}"

# Starter files: written once on first `copier copy`, protected from
# `copier update`.  Domain-owned — users customise these and keep their
# edits across template updates.
#
# NOTE: `_skip_if_exists` only preserves files that *already exist* at
# destination; it does NOT protect against re-creation on projects that
# never had the file.  For scaffold files that a retrofitted project
# might legitimately skip (different docs layout etc.), add the path to
# `_exclude` below instead of here.
#
# The four `src/{python_module}/{tools,resources,prompts,domain}.py`
# scaffolds + `tests/test_smoke.py` stay in `_skip_if_exists` because
# the template-owned `server.py` / `_server_deps.py` import from them
# and the template CI gate (`pytest -x -q`) needs at least one test to
# collect.  Retrofitted projects that don't want these files get a
# one-time creation on first weekly cron; `_skip_if_exists` preserves
# thereafter.
_skip_if_exists:
  - "src/{{python_module}}/tools.py"
  - "src/{{python_module}}/resources.py"
  - "src/{{python_module}}/prompts.py"
  - "src/{{python_module}}/domain.py"
  - "tests/conftest.py"
  - "tests/test_smoke.py"
  - "tests/test_cli.py"
  - "CHANGELOG.md"
  - "LICENSE"
  - ".env.example"
  - "packaging/mcpb/manifest.json.in"
  - "packaging/mcpb/pyproject.toml.in"
  - "packaging/mcpb/src/server.py"
  - "packaging/mcpb/build.sh"
  - "scripts/bump_manifests.py"
  - ".gitignore"
  # nfpm env template — users customise with domain-specific env vars; installs
  # to /etc/{project}/env.example with config|noreplace so operators copy it to
  # /etc/{project}/env locally anyway, but keep the source customisation across
  # template updates.
  - "packaging/env.example"
  # pre-commit hook config — users add domain-specific hooks (shellcheck,
  # yamllint, project-specific linters, etc.) on top of the shipped defaults;
  # preserve customisation across updates.
  - ".pre-commit-config.yaml"
  # Vale config — users tune rule overrides, add Vocab, pin Packages
  # versions per their docs corpus.  Initial render seeds the file; later
  # template updates leave their tuning intact.
  - ".vale.ini"
  # Vale Vocab accept list — the activation vehicle for `Vocab = Base` in
  # .vale.ini above.  Users add project-specific accepted terms as their
  # docs corpus grows; without _skip_if_exists, copier update would wipe
  # those additions on every weekly cron and reseed the template version.
  - ".vale/styles/config/vocabularies/Base/accept.txt"
  # Config-wizard domain spec — the entire file is domain content (the project's
  # questions, secrets, guards, and meta identity).  The wizard *runtime*
  # (generators.js, wizard.js, config-wizard.css, wizard-spec-schema.json) is
  # template-owned and overwritten on update; only this spec is domain-owned.
  - "docs/javascripts/config-wizard/wizard-spec.json"
  # Domain-specific wizard browser tests — seeded with one skipped placeholder,
  # owned downstream.  Generic framework tests stay in
  # test_config_wizard_smoke.py (template-owned).
  - "tests/test_config_wizard_domain.py"
  # MCP Apps SPA source — domain-owned (the project's UI). vendor_spa.py
  # regenerates app.html from it on every copier update; app.html itself is
  # generated, never template-owned.
  - "src/{{ python_module }}/static/app.src.html"
# Note: CLAUDE.md and README.md are deliberately NOT in _skip_if_exists.
# Both are hybrid files: domain-owned sections are bracketed by
# <!-- DOMAIN-START --> / <!-- DOMAIN-END --> markers, and the rest is
# template-owned.  Copier's plain 3-way merge (old-rendered vs new-rendered
# vs current) does the actual work: because DOMAIN-block contents are
# stable across renders, downstream edits inside them survive the merge;
# template-owned text diverges between old-rendered and new-rendered so
# those changes get re-applied.  The DOMAIN markers and the
# ===== TEMPLATE-OWNED ===== banner comments are a human/agent convention
# — copier itself doesn't act on them.  README.md was moved out of
# _skip_if_exists in #57.  The same hybrid pattern applies to
# docs/*.md.jinja files: docs/deployment/* and docs/guides/authentication.md
# moved out in #29 (PR #108); docs/guides/authorization.md (the
# enable_authorization-gated guide, DOMAIN-AUTHZ-SCOPES/EXTRA sentinels)
# added in #178; the remaining top-level docs/*.md files
# (index, installation, configuration, tools/index, prompts) moved out in #106.
# Those docs files use topic-specific DOMAIN-{TOPIC}-{KIND} sentinels
# rather than the bare DOMAIN-START used in CLAUDE.md / README.md.

# Files in the template repo that should never land in generated projects.
# Setting _exclude in copier.yml REPLACES copier's default exclude list
# entirely — so we re-list the stock defaults (.git, __pycache__, ~*, etc.)
# here as well.
#
# Named README.md/CHANGELOG.md/LICENSE/CLAUDE.md files also exist in this
# repo as maintainer-facing documentation; copier's `.jinja` precedence
# means README.md.jinja / CLAUDE.md.jinja / CHANGELOG.md.jinja / LICENSE.jinja
# render into the destination, and the plain files stay only in the template
# repo.  They don't need to be listed here for that to work.
_exclude:
  # Copier's default excludes (lost when we set _exclude explicitly):
  - "copier.yml"
  - "copier.yaml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  # Template-repo-specific excludes:
  - "tests/fixtures"
  - ".github/workflows/template-ci.yml"       # self-test — template-repo only
  - ".github/workflows/template-release.yml"  # template's own release — template-repo only
  - "docs/superpowers"
  - "uv.lock"                                 # generated projects create their own
  - "scripts/tests"                            # aggregator unit tests — template-only
  # Scaffold files that projects routinely have their own version of
  # (different docs layout, different test organisation).  Excluding
  # them here means they never render on copy OR update — fresh
  # projects bring their own docs and tests; retrofitted projects don't
  # get spurious re-creations every week.  The `.jinja` files stay in
  # this repo as maintainer-facing reference content.
  - "tests/test_tools.py"
  - "docs/design/index.md"

# --- Variables ---

project_name:
  type: str
  help: "Repo name, CLI command, Docker image basename (e.g. markdown-vault-mcp)"
  validator: >-
    {% if not (project_name | regex_search('^[a-z][a-z0-9-]*$')) %}
    Lowercase letters, digits, and hyphens only; must start with a letter.
    {% endif %}

pypi_name:
  type: str
  default: "{{ project_name }}"
  help: "PyPI distribution name (override when it differs from project_name)"

python_module:
  type: str
  default: "{{ pypi_name | replace('-', '_') }}"
  help: "Python import name (underscore-separated)"
  validator: >-
    {% if not (python_module | regex_search('^[a-z][a-z0-9_]*$')) %}
    Lowercase letters, digits, and underscores only; must start with a letter.
    {% endif %}

env_prefix:
  type: str
  help: "Env var prefix, no trailing underscore (e.g. MARKDOWN_VAULT_MCP)"
  validator: >-
    {% if not (env_prefix | regex_search('^[A-Z][A-Z0-9_]*[A-Z0-9]$')) %}
    Uppercase letters, digits, and underscores only; must start and end with letter/digit.
    {% endif %}

human_name:
  type: str
  help: "Human-readable project name for docs (e.g. 'Markdown Vault MCP')"

domain_description:
  type: str
  help: "One-line blurb for README and the default MCP instructions"

github_org:
  type: str
  default: "pvliesdonk"
  help: "Used for URLs, Docker registry path, and GitHub references"

docker_registry:
  type: str
  default: "ghcr.io/{{ github_org }}"
  help: "Docker registry (override for docker.io or a private registry)"

include_mcp_apps_scaffold:
  type: bool
  default: false
  help: "Include MCP Apps SPA scaffold (hash-routed app-only tools, inline HTML placeholder); leave off for projects without a visual UI"

enable_authorization:
  type: bool
  default: false
  help: "Scaffold the opt-in per-subject authorization surface: the commented ACL middleware stubs in config.py/server.py, the brief README 'Authorization' pointer, the docs/guides/authorization.md guide and its nav entry, the *_ACL_PATH line in .env.example, and the cross-link in the authentication guide. Leave off unless this server needs per-caller scope gating (runtime enablement is still via the *_ACL_PATH env var)."

enable_structural_gate:
  type: bool
  default: true
  help: "Scaffold the diff-scoped structural-health gate: strict ruff structural rules (complexity, god-class, too-many-*, security) enforced on changed lines only via diff-quality, as a pre-push hook and a CI 'structure' job, plus the CLAUDE.md structural-health guidance (local-shape rules, advisory radon/vulture audit, decay-issue template). New code is held to the bar; pre-existing code is never blocked. Leave on unless a project deliberately opts out of structural enforcement."

structural_gate_assert_clean_tree:
  type: bool
  default: true
  when: "{{ enable_structural_gate }}"
  help: "Also assert the project's EXISTING src/ + tests/ tree is already clean under the structural overlay (the test_shipped_code_passes_the_structural_overlay_cleanly check). True is correct for new projects and the template's own CI. Set to false when ADOPTING the gate onto a brownfield codebase that already carries structural debt: you still get the diff-scoped gate, pre-push hook, CI 'structure' job, and the behavioural tests — only the whole-tree clean assertion is dropped, so enabling the gate does not force refactoring or blanket-noqa of all legacy debt first (the diff-scoped gate still grandfathers it and blocks new debt). Only asked when the structural gate is on."
