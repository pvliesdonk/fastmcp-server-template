name: template-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-and-gate:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.6"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Render smoke project with copier
        run: |
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            . /tmp/smoke

      - name: Idempotence check (second render is byte-identical)
        # Runs BEFORE the gate so the first render is still pristine.
        # ``uv sync``/``ruff``/``mypy``/``pytest`` would otherwise add
        # .venv, uv.lock, .mypy_cache etc. that the second (untouched)
        # render doesn't have.
        run: |
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            . /tmp/smoke2
          if ! diff -r /tmp/smoke /tmp/smoke2 > /tmp/smoke-diff 2>&1; then
            echo "::error::second render differs from first — template is not idempotent"
            cat /tmp/smoke-diff
            exit 1
          fi

      - name: structural gate toggle-off render
        # The smoke project rendered in the first step has the gate ON, so the
        # install/lint/test steps that follow exercise the gate's artifacts and
        # its own test suite. This step renders a SECOND project with the gate
        # OFF and asserts every gated artifact is absent — the generated suite
        # cannot cover this (test_structural_gate.py does not render when the
        # gate is off), so a jinja edit that leaks an artifact past its
        # {% raw %}{% if %}{% endraw %} guard would otherwise pass CI silently.
        # One assertion per independently-gated block (pyproject has two: the
        # mccabe/pylint thresholds AND the tests/** S-ignore).
        run: |
          rm -rf /tmp/smoke-gate-off
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            --data enable_structural_gate=false \
            . /tmp/smoke-gate-off
          cd /tmp/smoke-gate-off
          test ! -f tests/test_structural_gate.py \
            || { echo "::error::structural test rendered with gate off"; exit 1; }
          test ! -f tests/.jinja \
            || { echo "::error::conditional filename left a stray tests/.jinja"; exit 1; }
          ! grep -q 'structural-diff-gate' .pre-commit-config.yaml \
            || { echo "::error::pre-push hook rendered with gate off"; exit 1; }
          ! grep -q 'default_install_hook_types' .pre-commit-config.yaml \
            || { echo "::error::default_install_hook_types rendered with gate off"; exit 1; }
          ! grep -qE '^  structure:' .github/workflows/ci.yml \
            || { echo "::error::structure CI job rendered with gate off"; exit 1; }
          ! grep -q 'tool.ruff.lint.mccabe' pyproject.toml \
            || { echo "::error::structural thresholds rendered with gate off"; exit 1; }
          ! grep -qF '"tests/**"' pyproject.toml \
            || { echo "::error::structural tests/** S-ignore rendered with gate off"; exit 1; }
          ! grep -q '## Structural health' CLAUDE.md \
            || { echo "::error::structural-health section rendered with gate off"; exit 1; }
          ! grep -qF 'Structural quality (diff) passes' CLAUDE.md \
            || { echo "::error::structural acceptance-gate item rendered with gate off"; exit 1; }

      - name: Install rendered project
        working-directory: /tmp/smoke
        run: uv sync --all-extras --all-groups

      - name: ruff check
        working-directory: /tmp/smoke
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: /tmp/smoke
        run: uv run ruff format --check .

      - name: mypy
        working-directory: /tmp/smoke
        run: uv run mypy src/ tests/

      - name: pytest
        working-directory: /tmp/smoke
        run: uv run pytest -x -q

      - name: CLAUDE.md sentinel structure
        working-directory: /tmp/smoke
        run: |
          # Line-anchored regexes so prose mentions don't satisfy the check.
          # Count assertions so a dropped inner DOMAIN-START/END pair fails
          # loudly — copier's 3-way merge needs all fences intact.
          # `|| true` keeps bash -e from aborting at the command substitution when
          # grep finds zero matches (exit 1), so the ::error:: lines below fire
          # instead of an opaque "exit 1" without context.
          start=$(grep -cE '^<!-- DOMAIN-START -->$' CLAUDE.md || true)
          end=$(grep -cE '^<!-- DOMAIN-END -->$' CLAUDE.md || true)
          [ "$start" = "3" ] || { echo "::error::expected 3 DOMAIN-START fences, found $start"; exit 1; }
          [ "$end" = "3" ] || { echo "::error::expected 3 DOMAIN-END fences, found $end"; exit 1; }
          grep -qE '^<!-- ===== TEMPLATE-OWNED SECTIONS BELOW' CLAUDE.md || { echo "::error::missing TEMPLATE-OWNED opening fence"; exit 1; }
          grep -qE '^<!-- ===== TEMPLATE-OWNED SECTIONS END ===== -->$' CLAUDE.md || { echo "::error::missing TEMPLATE-OWNED closing fence"; exit 1; }
          # TEMPLATE-TRACKING marker pairs (2): one around the bot-reviewer
          # paragraph, one around Shared Infrastructure + Contributing fixes
          # upstream. FORKING.md's detach scrub deletes them as a sed range — a
          # dropped marker would make the scrub delete the wrong span, so the
          # count must stay exact.
          ttstart=$(grep -cE '^<!-- TEMPLATE-TRACKING-START -->$' CLAUDE.md || true)
          ttend=$(grep -cE '^<!-- TEMPLATE-TRACKING-END -->$' CLAUDE.md || true)
          [ "$ttstart" = "2" ] || { echo "::error::expected 2 TEMPLATE-TRACKING-START markers, found $ttstart"; exit 1; }
          [ "$ttend" = "2" ] || { echo "::error::expected 2 TEMPLATE-TRACKING-END markers, found $ttend"; exit 1; }

      - name: shared docs render with consumer env_prefix
        working-directory: /tmp/smoke
        run: |
          # Smoke answers set env_prefix=SMOKE_MCP — rendered docs
          # should name some consumer-prefixed env var, never the placeholder.
          # Negative check uses a word-boundary regex so legitimate
          # rendered tokens like SMOKE_MCP_SERVER_NAME don't false-positive
          # as MCP_SERVER_ leaks (substring collision).
          for f in \
              docs/deployment/oidc.md \
              docs/deployment/docker.md \
              docs/guides/authentication.md; do
            grep -qE 'SMOKE_MCP_[A-Z][A-Z0-9_]*' "$f" \
              || { echo "::error::$f missing any SMOKE_MCP_ env var — substitution did not occur"; exit 1; }
          done
          ! grep -lE '(^|[^A-Z0-9_])MCP_SERVER_' \
              docs/deployment/docker.md \
              docs/deployment/oidc.md \
              docs/guides/authentication.md \
            || { echo "::error::MCP_SERVER_ placeholder literal leaked into shared docs"; exit 1; }
          ! grep -lF fastmcp-server-template \
              docs/deployment/docker.md \
              docs/deployment/oidc.md \
              docs/guides/authentication.md \
            || { echo "::error::fastmcp-server-template literal leaked into shared docs"; exit 1; }

      - name: Dockerfile sentinel structure
        working-directory: /tmp/smoke
        run: |
          for marker in \
            "# DOCKERFILE-STATE-DIRS-START" \
            "# DOCKERFILE-STATE-DIRS-END" \
            "# DOCKERFILE-VOLUMES-START" \
            "# DOCKERFILE-VOLUMES-END"; do
            # `|| true` keeps bash -e from aborting at the command substitution when
            # grep finds zero matches (exit 1), so the ::error:: line below fires instead
            # of an opaque "exit 1" without context.
            count=$(grep -cF "$marker" Dockerfile || true)
            [ "$count" = "1" ] || { echo "::error::expected 1 '$marker' sentinel, found $count"; exit 1; }
          done

      - name: release.yml marketplace upsert
        working-directory: /tmp/smoke
        run: |
          # Regression guard: upsert block must survive template renders.
          grep -qF '"git-subdir"' .github/workflows/release.yml \
            || { echo "::error::release.yml missing git-subdir marker — upsert regressed"; exit 1; }
          grep -qF '".claude-plugin/plugin"' .github/workflows/release.yml \
            || { echo "::error::release.yml missing .claude-plugin/plugin path — upsert regressed"; exit 1; }
          grep -qF 'any(.[]; .name == $name)' .github/workflows/release.yml \
            || { echo "::error::release.yml missing upsert branch — still silently no-ops on missing entry"; exit 1; }

      - name: vale config structural check
        working-directory: /tmp/smoke
        run: |
          # Cheap sanity check on the rendered .vale.ini — catches
          # template breakage (empty file, missing Packages directive)
          # without paying the cost of a full vale sync+lint round.
          [ -f .vale.ini ] || { echo "::error::.vale.ini missing — render regressed"; exit 1; }
          grep -qE '^StylesPath\s*=' .vale.ini \
            || { echo "::error::.vale.ini missing StylesPath directive"; exit 1; }
          grep -qE '^Packages\s*=' .vale.ini \
            || { echo "::error::.vale.ini missing Packages directive"; exit 1; }
          grep -qE '^\[\*\.md\]$' .vale.ini \
            || { echo "::error::.vale.ini missing [*.md] section"; exit 1; }
          grep -qE '^BasedOnStyles\s*=' .vale.ini \
            || { echo "::error::.vale.ini missing BasedOnStyles directive"; exit 1; }

      - name: vale version pin lockstep
        working-directory: /tmp/smoke
        run: |
          # CI's vale-cli/vale-action `version:` and pre-commit's vale hook
          # `rev:` must stay in lockstep — drift means local pre-commit and
          # CI exercise different Vale binaries, so a finding visible to one
          # becomes silent to the other. Same discipline as the nfpm
          # lockstep enforced in PR #66.
          #
          # CI_VER extraction is scoped to the `vale:` job to avoid
          # accidentally matching a `version: "X.Y.Z"` if some other job
          # (e.g. setup-uv) ever moves off `version: "latest"` to a pinned
          # semver — that would silently extract the wrong pin and let real
          # drift slip through.
          CI_VER=$(awk '/^  vale:/{f=1} f && /^[[:space:]]+version:/{print; exit}' .github/workflows/ci.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          PC_VER=$(awk '/^[[:space:]]*-[[:space:]]*repo:.*vale-cli\/vale[[:space:]]*$/{f=1; next} f && /rev:/{print; exit}' .pre-commit-config.yaml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ -n "$CI_VER" ] || { echo "::error::vale version pin not found in rendered ci.yml"; exit 1; }
          [ -n "$PC_VER" ] || { echo "::error::vale rev not found in rendered .pre-commit-config.yaml"; exit 1; }
          [ "$CI_VER" = "$PC_VER" ] \
            || { echo "::error::vale version drift — ci.yml=$CI_VER pre-commit=$PC_VER (bump in lockstep)"; exit 1; }

      - name: vale exclusion-scope lockstep
        working-directory: /tmp/smoke
        run: |
          # CI's vale_flags glob and pre-commit's exclude regex must scope to
          # the same subtree. Drift means CI and pre-commit lint different file
          # sets — a finding visible to one is silent to the other.
          #
          # CI extraction is scoped to the vale: job (same awk anchor as the
          # version check above) to avoid false matches on other vale_flags
          # values if a downstream adds a second Vale invocation.
          CI_EXCL=$(awk '/^  vale:/{f=1} f && /vale_flags:/{print; exit}' .github/workflows/ci.yml \
            | grep -oE '!docs/[^"'"'"' ]*' || true)
          # grep -A15 bounds the search to the vale hook block. The `$`
          # anchor avoids matching `- id: vale-sync`. Window of 15 safely
          # covers the 11-line gap between `- id: vale` and `exclude:` in the
          # rendered pre-commit config; prevents capturing a later hook's
          # exclude if the vale hook's own exclude is removed.
          PC_EXCL=$(grep -A15 '^[[:space:]]*- id: vale$' .pre-commit-config.yaml \
            | grep -m1 'exclude:' \
            | grep -oE 'docs/[^[:space:]]*' || true)
          [ -n "$CI_EXCL" ] || { echo "::error::vale exclusion glob not found in ci.yml vale_flags"; exit 1; }
          [ -n "$PC_EXCL" ] || { echo "::error::vale exclude not found in .pre-commit-config.yaml vale hook"; exit 1; }
          # Normalize: strip leading ! / ^ and trailing /** / before comparing.
          CI_NORM=$(echo "${CI_EXCL#!}" | sed 's|/\*\*$||;s|/$||')
          PC_NORM=$(echo "${PC_EXCL#^}" | sed 's|/\*\*$||;s|/$||')
          [ "$CI_NORM" = "$PC_NORM" ] \
            || { echo "::error::vale exclusion scope drift — ci.yml=$CI_EXCL pre-commit=$PC_EXCL"; exit 1; }

      - name: detach smoke (FORKING.md commands produce a clean standalone state)
        working-directory: /tmp/smoke
        run: |
          # Mirrors the documented detach in the rendered FORKING.md. Runs LAST
          # because it mutates the tree in place; idempotence + gate already ran
          # on the pristine render. Asserts issue #182's Verification block.

          # --- Step 1: stop tracking ---
          rm -f .copier-answers.yml
          # --- Step 2: prune template-origin CI + fleet review wiring ---
          rm -f .github/workflows/copier-update.yml \
                .github/workflows/claude.yml \
                .github/workflows/claude-code-review.yml
          rm -rf .gemini
          rm -f scripts/copier_update_aggregator.py
          rm -rf scripts/copier_update_prompts
          # --- Step 3: scrub CLAUDE.md template-tracking + copier-update wording ---
          # -i.bak + rm mirrors FORKING.md's portable form (GNU + BSD sed).
          sed -i.bak \
            -e '/<!-- TEMPLATE-TRACKING-START -->/,/<!-- TEMPLATE-TRACKING-END -->/d' \
            -e '/<!-- ===== TEMPLATE-OWNED SECTIONS BELOW/d' \
            -e '/<!-- ===== TEMPLATE-OWNED SECTIONS END ===== -->/d' \
            -e 's/ Kept across copier update\.//' \
            -e 's/ on top of the shipped defaults survive `copier update`\./ on top of the shipped defaults are yours to maintain./' \
            -e 's/ are preserved across `copier update`\./ are domain-owned./' \
            -e 's/The block is preserved across `copier update`\./The block is domain-owned./' \
            CLAUDE.md && rm -f CLAUDE.md.bak
          # --- Closing ("You are now standalone"): remove the detach guide.
          #     FORKING.md's numbered Step 4 (README cleanup) is intentionally
          #     NOT mirrored here — it mutates README prose this smoke does not
          #     assert (a documented spec non-goal).
          rm -f FORKING.md

          # --- assert the detached state ---
          [ ! -f .copier-answers.yml ] \
            || { echo "::error::.copier-answers.yml still present after detach"; exit 1; }
          [ ! -f FORKING.md ] \
            || { echo "::error::FORKING.md not removed by detach"; exit 1; }
          ! grep -rn "copier" .github/ \
            || { echo "::error::copier reference remains under .github/ after detach"; exit 1; }
          # The first three tokens are issue #182's literal Verification block;
          # the last two ("lives upstream", "propagate here via copier update")
          # are actual prose inside the scrubbed TEMPLATE-TRACKING range, so this
          # grep bites on a regressed scrub rather than passing vacuously.
          ! grep -rniE "fleet|downstream conforms|shape lives in pvl-core|lives upstream|propagate here via .?copier update" CLAUDE.md \
            || { echo "::error::template-tracking language remains in CLAUDE.md after scrub"; exit 1; }
          # A detached fork's CLAUDE.md must not claim its sections are
          # overwritten or preserved by copier update (issue #184). The scrub
          # strips every such mention (banner fences, DOMAIN "Kept across" notes,
          # "preserved/survive across copier update" prose), so none may remain.
          ! grep -niF 'copier update' CLAUDE.md \
            || { echo "::error::copier-update wording remains in CLAUDE.md after detach scrub"; exit 1; }
          grep -qE '^## Shared Infrastructure$' CLAUDE.md \
            && { echo "::error::Shared Infrastructure section survived the scrub"; exit 1; } || true
          grep -qE '^## Contributing fixes upstream$' CLAUDE.md \
            && { echo "::error::Contributing fixes upstream section survived the scrub"; exit 1; } || true
          grep -qF 'claude-review, gemini-code-assist' CLAUDE.md \
            && { echo "::error::bot-reviewer paragraph survived the scrub"; exit 1; } || true
          # Neutral guidance must remain. The scrub is a sed range-delete, so the
          # only "deleted too much" failure mode (given the pristine-render
          # marker-count guard already holds 2 balanced pairs) is a misplaced
          # marker that swallows a section adjacent to one of the FOUR marker
          # boundaries. Every boundary is bracketed by a must-survive assertion:
          #   pair 1 START → ## PR Discipline (above)
          #   pair 1 END   → ## GitHub Review Types (below)
          #   pair 2 START → ## Server Info Tool (above)
          #   pair 2 END   → ## Key Design Decisions (below; the TEMPLATE-OWNED
          #                  END fence that used to sit here is removed by the
          #                  scrub, so ## Key Design Decisions is now the sole
          #                  below-the-boundary over-run guard)
          # The remaining entries are the other sections FORKING.md promises survive.
          for kept_section in \
              '^## Conventions$' \
              '^## Hard PR Acceptance Gates$' \
              '^## PR Discipline$' \
              '^## Logging Standard$' \
              '^## Config & Customization Contract$' \
              '^## Server Info Tool' \
              '^## GitHub Review Types$' \
              '^## Key Design Decisions$'; do
            grep -qE "$kept_section" CLAUDE.md \
              || { echo "::error::neutral section '$kept_section' lost — scrub deleted too much"; exit 1; }
          done
          # The TEMPLATE-OWNED banner fences are intentionally removed by the
          # scrub (a detached fork owns every section), so assert both are gone.
          # The range-delete's bottom-boundary over-run guard is now
          # '## Key Design Decisions' (asserted in the kept-section loop above):
          # it sits below where the END fence was, so a range delete that ran to
          # EOF past pair 2 would drop it too.
          ! grep -qE '^<!-- ===== TEMPLATE-OWNED SECTIONS (BELOW|END)' CLAUDE.md \
            || { echo "::error::TEMPLATE-OWNED banner fence survived the detach scrub"; exit 1; }
          # stripped files gone:
          for gone in \
              .github/workflows/copier-update.yml \
              .github/workflows/claude.yml \
              .github/workflows/claude-code-review.yml \
              .gemini \
              scripts/copier_update_aggregator.py \
              scripts/copier_update_prompts; do
            [ ! -e "$gone" ] \
              || { echo "::error::$gone not removed by detach"; exit 1; }
          done
          # kept files present:
          for kept in \
              .github/workflows/ci.yml \
              .github/workflows/codeql.yml \
              .github/workflows/coverage-status.yml \
              .github/workflows/docs.yml \
              .github/workflows/release.yml; do
            [ -f "$kept" ] \
              || { echo "::error::$kept was removed but should be kept"; exit 1; }
          done
          echo "detach smoke passed"

  # Runs the two downstream workflow shapes that generated projects invoke
  # on their own CI — `mkdocs build --strict` (docs.yml) and `nfpm package`
  # (release.yml).  Dedicated non-matrix job so the downstream-gate is
  # decoupled from whichever Python versions render-and-gate's matrix rotates
  # through.  nfpm pinned to the same version as release.yml.jinja so a
  # template-ci pass genuinely implies a downstream-CI pass for this shape.
  downstream-gate:
    name: Downstream workflow gate (docs + packaging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.6"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Render smoke project with copier
        run: |
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            . /tmp/smoke

      - name: Install rendered project (with all extras and groups)
        working-directory: /tmp/smoke
        run: uv sync --all-extras --all-groups

      - name: Install nfpm
        # Pin matches release.yml.jinja so we exercise the same version
        # downstream projects will use.  Bump both in lockstep.
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin nfpm

      - name: mkdocs build --strict
        working-directory: /tmp/smoke
        run: uv run mkdocs build --strict

      - name: nfpm package (deb)
        working-directory: /tmp/smoke
        run: |
          mkdir -p dist
          VERSION=0.0.0 ARCH=amd64 nfpm package --packager deb --target dist/ --config packaging/nfpm.yaml

      - name: nfpm package (rpm)
        working-directory: /tmp/smoke
        run: |
          mkdir -p dist
          VERSION=0.0.0 ARCH=amd64 nfpm package --packager rpm --target dist/ --config packaging/nfpm.yaml

      - name: docker build smoke
        # Catches Dockerfile structural regressions (base-image drift,
        # broken multi-line RUN chains, missing ENTRYPOINT/CMD/USER).
        working-directory: /tmp/smoke
        run: docker build --no-cache --progress=plain -t smoke-mcp-ci .

      - name: docker run smoke (verify state dirs + ownership)
        # Catches in-RUN sentinel-comment regressions: if a future Dockerfile
        # parser ever passed `#` lines through to the shell, the joined
        # `\\`-continuation would treat the DOCKERFILE-STATE-DIRS sentinel
        # as a shell comment and silently drop the mkdir/chown — but
        # `useradd` is the last preceding command and exits 0, so the build
        # itself would succeed. Verifying the directories exist and are
        # appuser-owned at runtime is what makes the sentinel guarantee
        # actually testable.
        run: |
          docker run --rm --entrypoint /bin/sh smoke-mcp-ci -c '
            stat -c "%U" /data/service | grep -qx appuser &&
            stat -c "%U" /data/state/fastmcp | grep -qx appuser
          '

  aggregator-tests:
    name: Aggregator script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.6"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Run aggregator tests
        run: uv run --with pytest pytest scripts/tests/ -v

      - name: Lint aggregator (ruff check matching downstream's config)
        # Mirror the rendered project's [tool.ruff.lint] block in
        # pyproject.toml.jinja: same `select` list, same `ignore = ["E501"]`,
        # same line-length 88. Catch regressions here before they surface in
        # downstream CI on the next copier-update.
        run: |
          uv run --with ruff ruff check \
            --select E,W,F,I,B,C4,UP,ARG,SIM,TC,PTH,RUF \
            --ignore E501 \
            --line-length 88 \
            scripts/copier_update_aggregator.py scripts/tests/

      - name: Format check aggregator (ruff format matching downstream)
        run: |
          uv run --with ruff ruff format --check --line-length 88 \
            scripts/copier_update_aggregator.py scripts/tests/
