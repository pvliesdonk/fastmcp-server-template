name: template-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-and-gate:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.6"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Render smoke project with copier
        run: |
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            . /tmp/smoke

      - name: Install rendered project
        working-directory: /tmp/smoke
        run: uv sync --all-extras --dev

      - name: ruff check
        working-directory: /tmp/smoke
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: /tmp/smoke
        run: uv run ruff format --check .

      - name: mypy
        working-directory: /tmp/smoke
        run: uv run mypy src/

      - name: pytest
        working-directory: /tmp/smoke
        run: uv run pytest -x -q

      - name: Idempotence check (second render is byte-identical)
        run: |
          uv run --no-project --with copier \
            copier copy --trust --defaults \
            --data-file tests/fixtures/smoke-answers.yml \
            . /tmp/smoke2
          # _commit in .copier-answers.yml records the template SHA — identical
          # between renders, so we just diff the whole tree.
          if ! diff -r /tmp/smoke /tmp/smoke2 > /tmp/smoke-diff 2>&1; then
            echo "::error::second render differs from first — template is not idempotent"
            cat /tmp/smoke-diff
            exit 1
          fi
